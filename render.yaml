services:
  - type: web
    name: taskflow-backend
    runtime: python3
    buildCommand: "pip install -r server/requirements.txt"
    startCommand: "alembic upgrade head && python server/app.py"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
    healthCheckPath: /api/health
    plan: starter

  - type: web
    name: taskflow-frontend
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://taskflow-backend.onrender.com  # Update this with your backend URL after deployment
    plan: starter

databases:
  - name: taskflow-db
    databaseName: taskflow
    user: taskflow_user
    plan: starter